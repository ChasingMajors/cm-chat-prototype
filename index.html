<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>Ask Chasing Majors</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <main class="chat-app">
      <div class="chat-topbar">
        <div class="chat-brand-wrap">
          <div class="chat-brand-icon">CM</div>
          <div>
            <div class="chat-brand-title">Ask Chasing Majors</div>
            <div class="chat-brand-subtitle">Checklist search, print run lookup, player search, and more</div>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-suggestions" id="examplePills"></div>

      <div class="chat-input-shell">
        <input
          id="chatInput"
          class="chat-input"
          type="text"
          placeholder="Ask about a set, player, print run, checklist, trending, or releases..."
          autocomplete="off"
          enterkeyhint="send"
        />
        <button id="sendBtn" class="send-btn" type="button">Send</button>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
